name: Deploy site
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Render CMS content into pages
        run: python3 scripts/build_content.py || echo "content build step skipped"
      - name: Trim non-web files from the deploy artifact
        run: |
          find . -name "*.docx" -delete 2>/dev/null || true
          find . -name "*.csv"  -delete 2>/dev/null || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy1.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy3.outputs.page_url }}
    steps:
      - name: Deploy attempt 1
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Wait before retry
        if: steps.deploy1.outcome == 'failure'
        run: sleep 30
      - name: Deploy attempt 2
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Wait before final retry
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 60
      - name: Deploy attempt 3
        id: deploy3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
