name: Refresh Substack feed
on:
  schedule:
    - cron: '17 11 * * *'   # daily, 11:17 UTC
  workflow_dispatch:
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pull latest posts from Substack RSS
        run: python3 scripts/update_substack.py
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain index.html)" ]; then
            git config user.name "Peace Garden bot"
            git config user.email "actions@users.noreply.github.com"
            git add index.html
            git commit -m "Auto: refresh Soul Matters from Substack"
            git push
          else
            echo "No change to publish."
          fi
