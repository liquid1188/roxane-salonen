name: Refresh Substack feed
on:
  schedule:
    - cron: '17 */2 * * *'   # every two hours (UTC)
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  refresh:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
      - name: Pull latest posts from Substack RSS
        run: python3 scripts/update_substack.py
      - name: Commit if changed
        id: commit
        run: |
          if [ -n "$(git status --porcelain index.html)" ]; then
            git config user.name "Peace Garden bot"
            git config user.email "actions@users.noreply.github.com"
            git add index.html
            git commit -m "Auto: refresh Soul Matters from Substack"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No change to publish."
          fi
  deploy:
    # GITHUB_TOKEN pushes cannot trigger the main Deploy workflow,
    # so this workflow deploys the site itself when the feed changed.
    needs: refresh
    if: needs.refresh.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy1.outputs.page_url || steps.deploy2.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Render CMS content into pages
        run: python3 scripts/build_content.py || echo "content build step skipped"
      - name: Validate site (blocks deploy on failure)
        run: python3 scripts/validate_site.py
      - name: Trim non-web files from the deploy artifact
        run: |
          find . -name "*.docx" -delete 2>/dev/null || true
          find . -name "*.csv"  -delete 2>/dev/null || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy attempt 1
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Wait before retry
        if: steps.deploy1.outcome == 'failure'
        run: sleep 45
      - name: Deploy attempt 2
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
