backend:
  name: github
  repo: liquid1188/roxane-salonen
  branch: main

# Photos Roxane uploads land here and are referenced from the album.
media_folder: "images/album"
public_folder: "images/album"

site_url: https://liquid1188.github.io/roxane-salonen
display_url: https://liquid1188.github.io/roxane-salonen

collections:
  - name: "homepage"
    label: "Homepage"
    icon: "home"
    files:
      - name: "welcome"
        label: "Welcome & headline"
        file: "data/welcome.json"
        description: "The words at the very top of your site, and your welcome note."
        fields:
          - { name: "headline_start", label: "Big headline (first part)", widget: "string", hint: "e.g. 'Finding grace in the'" }
          - { name: "headline_accent", label: "Big headline (fancy script word)", widget: "string", hint: "e.g. 'ordinary.'" }
          - name: "roles"
            label: "Your roles (the small line above the headline)"
            widget: "list"
            field: { name: "role", label: "Role", widget: "string" }
          - { name: "welcome_text", label: "Welcome note", widget: "text" }
          - { name: "signature", label: "Signature", widget: "string" }
      - name: "feature"
        label: "Featured book"
        file: "data/feature.json"
        description: "The big book spotlight on your homepage. Swap it out any time."
        fields:
          - { name: "eyebrow", label: "Small label", widget: "string", hint: "e.g. 'The newest book'" }
          - { name: "title", label: "Book title", widget: "string" }
          - { name: "quote", label: "Pull quote", widget: "string" }
          - { name: "blurb", label: "Description", widget: "text" }
          - { name: "cover", label: "Cover image", widget: "image" }
          - { name: "badge", label: "Award badge image", widget: "image" }
          - { name: "link", label: "Button link", widget: "string" }
          - { name: "link_label", label: "Button text", widget: "string" }

  - name: "photos"
    label: "Photo Album"
    icon: "photo_library"
    files:
      - name: "album"
        label: "Photo Album"
        file: "data/photos.json"
        description: "Add, remove, or reorder photos. Upload new ones right here — drag to reorder."
        fields:
          - name: "items"
            label: "Photos"
            label_singular: "Photo"
            widget: "list"
            summary: "{{fields.caption}}"
            fields:
              - { name: "image", label: "Photo", widget: "image" }
              - { name: "caption", label: "Caption", widget: "string", required: false }

  - name: "speaking"
    label: "Speaking"
    icon: "campaign"
    files:
      - name: "topics"
        label: "Speaking topics"
        file: "data/speaking.json"
        description: "The topic chips and your three signature areas on the Speaking page."
        fields:
          - name: "chips"
            label: "Topic chips"
            widget: "list"
            field: { name: "chip", label: "Topic", widget: "string" }
          - name: "pillars"
            label: "Signature areas"
            label_singular: "Area"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { name: "title", label: "Title", widget: "string" }
              - { name: "desc", label: "One-line description", widget: "string" }

  - name: "awards"
    label: "Testimonials"
    icon: "format_quote"
    files:
      - name: "testimonials"
        label: "Testimonials"
        file: "data/testimonials.json"
        description: "Endorsements from colleagues — these appear on your Awards page. Paste each quote as it arrives."
        fields:
          - name: "items"
            label: "Testimonials"
            label_singular: "Testimonial"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { name: "quote", label: "Quote", widget: "text" }
              - { name: "name", label: "Name", widget: "string" }
              - { name: "role", label: "Role / title (optional)", widget: "string", required: false }

  - name: "instagram"
    label: "Instagram Feed"
    icon: "photo_camera"
    files:
      - name: "settings"
        label: "Instagram Feed"
        file: "data/instagram.json"
        description: "Live Instagram feed on the Photos page (powered by Behold)."
        fields:
          - { name: "enabled", label: "Show live feed", widget: "boolean", default: false }
          - { name: "behold_feed_url", label: "Behold feed ID", widget: "string", required: false, hint: "From behold.so after connecting Instagram" }
          - { name: "note", label: "Note (internal)", widget: "string", required: false }

  - name: "encounters"
    label: "Notable Encounters"
    icon: "handshake"
    files:
      - name: "encounters"
        label: "Notable Encounters"
        file: "data/encounters.json"
        description: "Memorable meetings featured on your About page. The first one is shown large."
        fields:
          - name: "items"
            label: "Encounters"
            label_singular: "Encounter"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { name: "image", label: "Photo", widget: "image" }
              - { name: "name", label: "Who", widget: "string" }
              - { name: "date", label: "Date", widget: "string", required: false }
              - { name: "blurb", label: "Description", widget: "text" }
              - name: "links"
                label: "Related articles"
                widget: "list"
                required: false
                summary: "{{fields.label}}"
                fields:
                  - { name: "label", label: "Article title", widget: "string" }
                  - { name: "url", label: "Link", widget: "string" }
                  - { name: "outlet", label: "Publication", widget: "string" }

  - name: "media"
    label: "Seen & Heard"
    icon: "podcasts"
    files:
      - name: "media"
        label: "Media Appearances"
        file: "data/media.json"
        description: "TV, radio, podcast, and article appearances. Grouped by type on the Seen & Heard page."
        fields:
          - { name: "tv", label: "Television", widget: "list", required: false, summary: "{{fields.outlet}}", fields: [
              { name: "outlet", label: "Show / outlet", widget: "string" },
              { name: "title", label: "Episode / title", widget: "string" },
              { name: "url", label: "Link", widget: "string" } ] }
          - { name: "radio", label: "Radio", widget: "list", required: false, summary: "{{fields.outlet}}", fields: [
              { name: "outlet", label: "Show / outlet", widget: "string" },
              { name: "title", label: "Episode / title", widget: "string" },
              { name: "url", label: "Link", widget: "string" } ] }
          - { name: "podcast", label: "Podcasts", widget: "list", required: false, summary: "{{fields.outlet}}", fields: [
              { name: "outlet", label: "Show / outlet", widget: "string" },
              { name: "title", label: "Episode / title", widget: "string" },
              { name: "url", label: "Link", widget: "string" } ] }
          - { name: "article", label: "Featured Articles", widget: "list", required: false, summary: "{{fields.outlet}}", fields: [
              { name: "outlet", label: "Publication", widget: "string" },
              { name: "title", label: "Article title", widget: "string" },
              { name: "url", label: "Link", widget: "string" } ] }

  - name: "cover_stories"
    label: "Book Cover Stories"
    icon: "auto_stories"
    files:
      - name: "cover_stories"
        label: "Cover Stories"
        file: "data/cover_stories.json"
        description: "The story behind each book cover. Turn on 'Show' once you've added the story."
        fields:
          - name: "finding-flannery"
            label: "Finding Flannery"
            widget: "object"
            fields:
              - { name: "enabled", label: "Show on site", widget: "boolean", default: false }
              - { name: "story", label: "Cover story", widget: "text", required: false }
              - { name: "artist_name", label: "Artist name", widget: "string", required: false }
              - { name: "artist_url", label: "Artist website", widget: "string", required: false }
          - name: "what-would-monica-do"
            label: "What Would Monica Do?"
            widget: "object"
            fields:
              - { name: "enabled", label: "Show on site", widget: "boolean", default: false }
              - { name: "story", label: "Cover story", widget: "text", required: false }
              - { name: "artist_name", label: "Artist name", widget: "string", required: false }
              - { name: "artist_url", label: "Artist website", widget: "string", required: false }

  - name: "articles"
    label: "Add an article"
    label_singular: "article"
    folder: "data/articles"
    create: true
    extension: "md"
    format: "frontmatter"
    slug: "{{fields.date}}-{{slug}}"
    summary: "{{title}} ({{date}})"
    fields:
      - { name: "title", label: "Title", widget: "string", hint: "The headline, e.g. 'Living Faith: ...'" }
      - { name: "date", label: "Date published", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - name: "categories"
        label: "Categories"
        widget: "select"
        multiple: true
        required: false
        options: ["Faith", "Forum Columns", "Second-chance Sundays", "Sidewalk Stories", "Prayer", "Family", "Outings", "Pro-life", "Celebrations", "Grief", "Writing"]
      - { name: "excerpt", label: "Short teaser (optional)", widget: "text", required: false, hint: "One or two sentences shown in the archive list. Leave blank to auto-generate." }
      - { name: "body", label: "Article text", widget: "markdown", hint: "Paste your column here. Bold, italics, and links all work." }
